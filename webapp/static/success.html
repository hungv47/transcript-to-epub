<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F7F0E5" />
  <meta name="robots" content="noindex" />
  <title>Your creator plan is active - TalkToBook</title>
  <meta name="description" content="Your TalkToBook creator plan is active and your clean edition is being prepared." />
  <link rel="canonical" href="https://talktobook.com/success" />

  <meta property="og:title" content="Your creator plan is active - TalkToBook" />
  <meta property="og:description" content="Your TalkToBook clean edition is being prepared." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://talktobook.com/success" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <a class="skip" href="#main">Skip to downloads</a>

  <header class="site-header">
    <a class="wordmark" href="/">TalkToBook</a>
    <nav aria-label="Primary"><a class="btn btn-ghost btn-sm" href="/">Make another</a></nav>
  </header>

  <main id="main" class="section section--app">
    <div class="app">
      <article class="card result" aria-live="polite">
        <span class="result-tag">Creator plan active</span>
        <h1 id="title" class="section-title" style="font-size:2.3rem;margin:.4em 0 .2em;">Building your edition…</h1>
        <p id="status" class="result-meta">Dropping the watermark and rendering EPUB, PDF, and Kindle. A few seconds.</p>
        <div id="downloads" class="upsell" hidden>
          <h4>Your downloads</h4>
          <p id="download-links" style="font-size:1.05rem;line-height:2.2;"></p>
          <p class="watermark-note">Your plan includes unlimited clean editions while active.</p>
        </div>
        <p id="error" class="form-error" role="alert" hidden></p>
      </article>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const jobId = params.get("job");
    const checkoutId = params.get("checkout_id") || params.get("session_id");
    const KINDS = { epub: "EPUB", pdf: "PDF", azw3: "Kindle (AZW3)" };

    async function poll(tries = 0) {
      if (!jobId) { fail("Missing job reference."); return; }
      try {
        const url = `/api/job/${jobId}` + (checkoutId ? `?checkout_id=${encodeURIComponent(checkoutId)}` : "");
        const job = await (await fetch(url)).json();
        document.getElementById("title").textContent = job.title || "Your book";
        if (job.paid && job.downloads) { show(job); return; }
      } catch (_) {}
      if (tries > 30) { fail("Still processing. Refresh in a moment, or check the email we sent."); return; }
      setTimeout(() => poll(tries + 1), 2000);
    }
    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    function show(job) {
      document.getElementById("status").textContent = "Done. Your clean, branded edition is ready.";
      const links = Object.entries(job.downloads)
        .map(([k, u]) => `<a class="btn btn-primary" style="margin:4px" href="${esc(u)}" download>${esc(KINDS[k] || k)}</a>`)
        .join(" ");
      document.getElementById("download-links").innerHTML = links;
      document.getElementById("downloads").hidden = false;
    }
    function fail(msg) {
      const e = document.getElementById("error");
      e.textContent = msg; e.hidden = false;
      document.getElementById("status").textContent = "";
    }
    poll();
  </script>
</body>
</html>
